<h2 id="aspx"><a href="#aspx" class="headerlink" title="aspx"></a>aspx</h2><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br></pre></td><td class="code"><pre><span class="line">//轉換成TemplateField</span><br><span class="line">&lt;asp:GridView ID=&quot;GridView1&quot; runat=&quot;server&quot; AutoGenerateColumns=&quot;False&quot; DataKeyNames=&quot;No_ID&quot;&gt;</span><br><span class="line">    &lt;Columns&gt;</span><br><span class="line">        &lt;asp:TemplateField HeaderText=&quot;No_ID&quot; SortExpression=&quot;No_ID&quot;&gt;</span><br><span class="line">            &lt;EditItemTemplate&gt;</span><br><span class="line">                &lt;asp:Label ID=&quot;Label1&quot; runat=&quot;server&quot; Text=&#x27;&lt;%# Eval(&quot;No_ID&quot;) %&gt;&#x27;&gt;&lt;/asp:Label&gt;</span><br><span class="line">            &lt;/EditItemTemplate&gt;</span><br><span class="line">            &lt;ItemTemplate&gt;</span><br><span class="line">                &lt;asp:Label ID=&quot;Label1&quot; runat=&quot;server&quot; Text=&#x27;&lt;%# Bind(&quot;No_ID&quot;) %&gt;&#x27;&gt;&lt;/asp:Label&gt;</span><br><span class="line">            &lt;/ItemTemplate&gt;</span><br><span class="line">        &lt;/asp:TemplateField&gt;</span><br><span class="line">        &lt;asp:TemplateField HeaderText=&quot;ID&quot; SortExpression=&quot;ID&quot;&gt;</span><br><span class="line">            &lt;EditItemTemplate&gt;</span><br><span class="line">                &lt;asp:TextBox ID=&quot;TextBox1&quot; runat=&quot;server&quot; Text=&#x27;&lt;%# Bind(&quot;ID&quot;) %&gt;&#x27;&gt;&lt;/asp:TextBox&gt;</span><br><span class="line">            &lt;/EditItemTemplate&gt;</span><br><span class="line">            &lt;ItemTemplate&gt;</span><br><span class="line">                &lt;asp:Label ID=&quot;Label2&quot; runat=&quot;server&quot; Text=&#x27;&lt;%# Bind(&quot;ID&quot;) %&gt;&#x27;&gt;&lt;/asp:Label&gt;</span><br><span class="line">            &lt;/ItemTemplate&gt;</span><br><span class="line">        &lt;/asp:TemplateField&gt;</span><br><span class="line">        &lt;asp:TemplateField HeaderText=&quot;PN&quot; SortExpression=&quot;PN&quot;&gt;</span><br><span class="line">            &lt;EditItemTemplate&gt;</span><br><span class="line">                &lt;asp:TextBox ID=&quot;TextBox2&quot; runat=&quot;server&quot; Text=&#x27;&lt;%# Bind(&quot;PN&quot;) %&gt;&#x27;&gt;&lt;/asp:TextBox&gt;</span><br><span class="line">            &lt;/EditItemTemplate&gt;</span><br><span class="line">            &lt;ItemTemplate&gt;</span><br><span class="line">                &lt;asp:Label ID=&quot;Label3&quot; runat=&quot;server&quot; Text=&#x27;&lt;%# Bind(&quot;PN&quot;) %&gt;&#x27;&gt;&lt;/asp:Label&gt;</span><br><span class="line">            &lt;/ItemTemplate&gt;</span><br><span class="line">        &lt;/asp:TemplateField&gt;               </span><br><span class="line">    &lt;/Columns&gt;</span><br><span class="line">&lt;/asp:GridView&gt;</span><br></pre></td></tr></table></figure>

<h2 id="cs"><a href="#cs" class="headerlink" title="cs"></a>cs</h2><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br><span class="line">98</span><br><span class="line">99</span><br><span class="line">100</span><br><span class="line">101</span><br><span class="line">102</span><br><span class="line">103</span><br><span class="line">104</span><br><span class="line">105</span><br><span class="line">106</span><br><span class="line">107</span><br><span class="line">108</span><br><span class="line">109</span><br><span class="line">110</span><br><span class="line">111</span><br><span class="line">112</span><br><span class="line">113</span><br></pre></td><td class="code"><pre><span class="line">///宣告</span><br><span class="line">protected string conn = ConfigurationManager.ConnectionStrings[&quot;資料庫連結名稱&quot;].ConnectionString;   </span><br><span class="line">private SqlConnection connection;</span><br><span class="line">private SqlCommand cmd;</span><br><span class="line">private SqlDataAdapter adapter;</span><br><span class="line">private DataTable dt;</span><br><span class="line">protected void Page_Load(object sender, EventArgs e)</span><br><span class="line">&#123;</span><br><span class="line">    if (!IsPostBack)//Get Method進來</span><br><span class="line">    &#123;</span><br><span class="line">        connection = new SqlConnection(conn);</span><br><span class="line">        cmd = new SqlCommand();</span><br><span class="line">        cmd.Connection = connection;</span><br><span class="line">        GVGetData();</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line">/// &lt;summary&gt;</span><br><span class="line">/// 取得資料</span><br><span class="line">/// &lt;/summary&gt;</span><br><span class="line">private DataTable GetData()</span><br><span class="line">&#123;</span><br><span class="line">    dt = new DataTable();</span><br><span class="line">    string queryString = &quot;SQL語法(資料庫顯示內容)&quot;; //需要修改處</span><br><span class="line">    cmd = new SqlCommand(queryString, connection);</span><br><span class="line">    adapter = new SqlDataAdapter(cmd);</span><br><span class="line">    adapter.Fill(dt);</span><br><span class="line">    return dt;</span><br><span class="line">&#125;</span><br><span class="line">/// &lt;summary&gt;</span><br><span class="line">/// 取得資料</span><br><span class="line">/// &lt;/summary&gt;</span><br><span class="line">private void GVGetData()</span><br><span class="line">&#123;</span><br><span class="line">    DataTable _dt;</span><br><span class="line"></span><br><span class="line">    if (ViewState[&quot;se&quot;] == null)</span><br><span class="line">    &#123;</span><br><span class="line">        _dt = GetData();</span><br><span class="line">        GridView1.DataSource = _dt;</span><br><span class="line">        GridView1.DataBind();</span><br><span class="line">    &#125;</span><br><span class="line">    else</span><br><span class="line">    &#123;</span><br><span class="line">        string se = Convert.ToString(ViewState[&quot;se&quot;]);</span><br><span class="line">        SortDirection sd = (SortDirection)ViewState[&quot;sd&quot;];</span><br><span class="line">        this.GVGetData(sd, se);</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line">/// &lt;summary&gt;</span><br><span class="line">/// 取得排序資料</span><br><span class="line">/// &lt;/summary&gt;</span><br><span class="line">private void GVGetData(SortDirection pSortDirection,</span><br><span class="line">    string pSortExpression)</span><br><span class="line">&#123;</span><br><span class="line">    DataTable _dt = GetData();</span><br><span class="line"></span><br><span class="line">    string sSort = string.Empty;</span><br><span class="line">    if (pSortDirection == SortDirection.Ascending)</span><br><span class="line">    &#123;</span><br><span class="line">        sSort = pSortExpression;</span><br><span class="line">    &#125;</span><br><span class="line">    else</span><br><span class="line">    &#123;</span><br><span class="line">        sSort = string.Format(&quot;&#123;0&#125; &#123;1&#125;&quot;, pSortExpression, &quot;DESC&quot;);</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    DataView dv = _dt.DefaultView;</span><br><span class="line">    dv.Sort = sSort;</span><br><span class="line"></span><br><span class="line">    GridView1.DataSource = dv;</span><br><span class="line">    GridView1.DataBind();</span><br><span class="line">&#125;</span><br><span class="line">/// &lt;summary&gt;</span><br><span class="line">/// 排序</span><br><span class="line">/// &lt;/summary&gt;</span><br><span class="line">protected void gv_Sorting(object sender, GridViewSortEventArgs e)</span><br><span class="line">&#123;</span><br><span class="line">    string se = ViewState[&quot;se&quot;] != null ?</span><br><span class="line">    Convert.ToString(ViewState[&quot;se&quot;]) : string.Empty;</span><br><span class="line">    SortDirection sd = ViewState[&quot;sd&quot;] != null ?</span><br><span class="line">        (SortDirection)ViewState[&quot;sd&quot;] : SortDirection.Ascending;</span><br><span class="line"></span><br><span class="line">    if (string.IsNullOrEmpty(se))</span><br><span class="line">    &#123;</span><br><span class="line">        se = e.SortExpression;</span><br><span class="line">        sd = SortDirection.Ascending;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    // 如果欄位與本來不同</span><br><span class="line">    if (se != e.SortExpression)</span><br><span class="line">    &#123;</span><br><span class="line">        // 切換為目前所指定欄位</span><br><span class="line">        se = e.SortExpression;</span><br><span class="line"></span><br><span class="line">        // 指定排列方式為升冪</span><br><span class="line">        sd = SortDirection.Ascending;</span><br><span class="line">    &#125;</span><br><span class="line">    // 如果欄位與本來相同</span><br><span class="line">    else</span><br><span class="line">    &#123;</span><br><span class="line">        // 切換升冪為降冪，降冪為升冪</span><br><span class="line">        if (sd == SortDirection.Ascending)</span><br><span class="line">            sd = SortDirection.Descending;</span><br><span class="line">        else</span><br><span class="line">            sd = SortDirection.Ascending;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    // 紀錄欄位與排列方式 ( 升冪或降冪 )</span><br><span class="line">    ViewState[&quot;se&quot;] = se;</span><br><span class="line">    ViewState[&quot;sd&quot;] = sd;</span><br><span class="line"></span><br><span class="line">    GVGetData(sd, se);</span><br><span class="line">&#125; </span><br></pre></td></tr></table></figure>

      activeClass = localStorage.getItem('comments_active') || activeClass;
    }
    if (activeClass) {
      let activeTab = document.querySelector(`a[href="#comment-${activeClass}"]`);
      if (activeTab) {
        activeTab.click();
      }
    }
  });
  if (CONFIG.comments.storage) {
    window.addEventListener('tabs:click', event => {
      if (!event.target.matches('.tabs-comment .tab-content .tab-pane')) return;
      let commentClass = event.target.classList[1];
      localStorage.setItem('comments_active', commentClass);
    });
  }
</script>
